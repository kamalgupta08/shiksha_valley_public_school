{% extends "base.html" %}
{% block title %}Staff Login &middot; {{ config.SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">SV</span>
      <span class="brand-name">{{ config.SCHOOL_NAME }}</span>
    </div>
    <h1>Staff Login</h1>
    <p class="sub">Use the shared office credentials to continue.</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>
  </div>
</div>
{% endblock %}
